name: Build kernel

on:
  workflow_dispatch:
    inputs:
      ksu_variant:
        description: 'KernelSU variant (ALL = KWS + KSUN + VNL)'
        type: choice
        options:
          - KWS
          - KSUN
          - VNL
          - ALL
        default: KWS
      clang_variant:
        description: 'Clang toolchain Selection'
        type: choice
        options:
          - CLANG-19
          - CLANG-12
          - ALL
        default: CLANG-19
      kernel_name:
        description: 'Kernel base name'
        type: string
        default: GrayRavens-Zenithed
      kernel_ref:
        description: 'kernel branch / tag / SHA to build'
        type: string
        default: android12-5.10
      kmi_symbol_check:
        description: 'Run KMI symbol validation'
        type: boolean
        default: true

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      ksu_variants: ${{ steps.resolve.outputs.ksu_variants }}
      clang_variants: ${{ steps.resolve.outputs.clang_variants }}
    steps:
      - name: Resolve variants
        id: resolve
        run: |
          if [ "${{ inputs.ksu_variant }}" = "ALL" ]; then
            echo 'ksu_variants=["KWS","KSUN","VNL"]' >> "$GITHUB_OUTPUT"
          else
            echo 'ksu_variants=["${{ inputs.ksu_variant }}"]' >> "$GITHUB_OUTPUT"
          fi
          if [ "${{ inputs.clang_variant }}" = "ALL" ]; then
            echo 'clang_variants=["CLANG-19","CLANG-12"]' >> "$GITHUB_OUTPUT"
          else
            echo 'clang_variants=["${{ inputs.clang_variant }}"]' >> "$GITHUB_OUTPUT"
          fi

  notify-started:
    name: Notify Telegram (started)
    needs: setup
    runs-on: ubuntu-latest
    outputs:
      message_id: ${{ steps.send.outputs.message_id }}
    steps:
      - name: Send started alert
        id: send
        env:
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        run: |
          set -e
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          START_TS="$(date +"%m/%d/%y %I:%M %p")"
          MSG="$(printf '%b' "<b>⚙️ Build Started</b>\n📋 <b>Workflow:</b> Kernel Build\n📱 <b>Kernel:</b> <code>${{ inputs.kernel_name }}</code>\n🌿 <b>Ref:</b> <code>${{ inputs.kernel_ref }}</code>\n🔍 <a href=\"${RUN_URL}\">Watch on GitHub Actions</a>\n[${START_TS}]")"
          RES="$(curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" -d chat_id="${TG_CHAT_ID}" --data-urlencode text="$MSG" -d parse_mode="HTML" -d disable_web_page_preview=true)"
          MSG_ID="$(python3 -c "import json,sys; d=json.loads(sys.stdin.read() or '{}'); print(d.get('result',{}).get('message_id','null'))" <<< "$RES")"
          echo "message_id=$MSG_ID" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.ksu }} / ${{ matrix.clang }})
    needs: [setup, notify-started]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ksu: ${{ fromJson(needs.setup.outputs.ksu_variants) }}
        clang: ${{ fromJson(needs.setup.outputs.clang_variants) }}
    env:
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      MESSAGE_ID: ${{ needs.notify-started.outputs.message_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Record Start Time
        run: echo "START_TIME=$(date +%s)" >> "$GITHUB_ENV"

      - name: Update progress - Setup
        run: |
          set +e
          if [ -z "${MESSAGE_ID}" ] || [ "${MESSAGE_ID}" = "null" ]; then exit 0; fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BAR="##------------------ 10%"
          TEXT="$(printf '%b' "<b>⚙️ Build Progress</b>\n📋 <b>Workflow:</b> Kernel Build\n🧬 <b>Variant:</b> <code>${{ matrix.ksu }}</code> | <code>${{ matrix.clang }}</code>\n🧩 <b>Stage:</b> Setup\n📶 <b>Progress:</b> <code>${BAR}</code>\n🪵 <a href=\"${RUN_URL}\">Full Workflow Log</a>")"
          curl -s -o /dev/null -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/editMessageText" -d chat_id="${TG_CHAT_ID}" -d message_id="${MESSAGE_ID}" --data-urlencode text="$TEXT" -d parse_mode="HTML" -d disable_web_page_preview=true

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            bc bison flex build-essential libssl-dev libelf-dev \
            cpio kmod rsync zip patch curl ca-certificates \
            python3 python3-pip python3-lxml git wget binutils zstd

      - name: Download Clang 19
        if: matrix.clang == 'CLANG-19'
        run: |
          git clone --depth=1 https://gitlab.com/crdroidandroid/android_prebuilts_clang_host_linux-x86_clang-r536225.git ~/toolchain/aosp-r536225

      - name: Cache AOSP Clang r416183b
        if: matrix.clang == 'CLANG-12'
        id: cache-aosp-12
        uses: actions/cache@v4
        with:
          path: ~/toolchain/aosp-clang-r416183b
          key: aosp-clang-r416183b-x86_64

      - name: Download AOSP Clang r416183b
        if: matrix.clang == 'CLANG-12' && steps.cache-aosp-12.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b.git ~/toolchain/aosp-clang-r416183b

      - name: Export CLANG_PATH
        run: |
          case "${{ matrix.clang }}" in
            CLANG-19) echo "CLANG_PATH=$HOME/toolchain/aosp-r536225" >> "$GITHUB_ENV" ;;
            CLANG-12) echo "CLANG_PATH=$HOME/toolchain/aosp-clang-r416183b" >> "$GITHUB_ENV" ;;
          esac

      - name: Shallow-clone kernel source
        run: |
          git clone --depth=1 --branch "${{ inputs.kernel_ref }}" https://github.com/XTENSEI/kernel_common_5.10 kernel

      - name: Update progress - Kernel source
        run: |
          set +e
          if [ -z "${MESSAGE_ID}" ] || [ "${MESSAGE_ID}" = "null" ]; then exit 0; fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BAR="########------------ 40%"
          TEXT="$(printf '%b' "<b>⚙️ Build Progress</b>\n📋 <b>Workflow:</b> Kernel Build\n🧬 <b>Variant:</b> <code>${{ matrix.ksu }}</code> | <code>${{ matrix.clang }}</code>\n🧩 <b>Stage:</b> Kernel source\n📶 <b>Progress:</b> <code>${BAR}</code>\n🪵 <a href=\"${RUN_URL}\">Full Workflow Log</a>")"
          curl -s -o /dev/null -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/editMessageText" -d chat_id="${TG_CHAT_ID}" -d message_id="${MESSAGE_ID}" --data-urlencode text="$TEXT" -d parse_mode="HTML" -d disable_web_page_preview=true

      - name: Apply KernelSU
        if: matrix.ksu != 'VNL'
        working-directory: kernel
        run: |
          if [ "${{ matrix.ksu }}" = "KWS" ]; then
            curl -LSs "https://raw.githubusercontent.com/KOWX712/KernelSU/main/kernel/setup.sh" | bash -s master
            printf '\nCONFIG_KSU=y\nCONFIG_KSU_MANUAL_SU=n\nCONFIG_KSU_SUSFS=n\n' >> arch/arm64/configs/gki_defconfig
          else
            curl -LSs "https://raw.githubusercontent.com/pershoot/KernelSU-Next/dev-susfs/kernel/setup.sh" | bash -s dev-susfs
            printf '\nCONFIG_KSU=y\nCONFIG_KSU_MANUAL_SU=n\nCONFIG_KSU_SUSFS=y\n' >> arch/arm64/configs/gki_defconfig
          fi

      - name: Apply SUSFS patches (KSUN only)
        if: matrix.ksu == 'KSUN'
        working-directory: kernel
        run: |
          git clone https://gitlab.com/simonpunk/susfs4ksu/ -b gki-android12-5.10 sus
          rm -rf sus/.git
          susfs=sus/kernel_patches
          cp -r "$susfs/fs" .
          cp -r "$susfs/include" .
          cp -r "$susfs/50_add_susfs_in_gki-android12-5.10.patch" .
          patch -p1 < 50_add_susfs_in_gki-android12-5.10.patch

      - name: Set LOCALVERSION
        working-directory: kernel
        run: |
          LOCALVER="-${{ inputs.kernel_name }}-${{ matrix.ksu }}"
          printf '\nCONFIG_LOCALVERSION="%s"\n' "$LOCALVER" >> arch/arm64/configs/gki_defconfig

      - name: Run build.sh
        working-directory: kernel
        env:
          CLANG_PATH: ${{ env.CLANG_PATH }}
          CLANG_VARIANT: ${{ matrix.clang }}
          KMI_SYMBOL_CHECK: ${{ inputs.kmi_symbol_check }}
        run: |
          cp "$GITHUB_WORKSPACE/build.sh" .
          chmod +x build.sh
          ./build.sh

      - name: Update progress - Packaging
        run: |
          set +e
          if [ -z "${MESSAGE_ID}" ] || [ "${MESSAGE_ID}" = "null" ]; then exit 0; fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BAR="#################--- 85%"
          TEXT="$(printf '%b' "<b>⚙️ Build Progress</b>\n📋 <b>Workflow:</b> Kernel Build\n🧬 <b>Variant:</b> <code>${{ matrix.ksu }}</code> | <code>${{ matrix.clang }}</code>\n🧩 <b>Stage:</b> Packaging\n📶 <b>Progress:</b> <code>${BAR}</code>\n🪵 <a href=\"${RUN_URL}\">Full Workflow Log</a>")"
          curl -s -o /dev/null -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/editMessageText" -d chat_id="${TG_CHAT_ID}" -d message_id="${MESSAGE_ID}" --data-urlencode text="$TEXT" -d parse_mode="HTML" -d disable_web_page_preview=true

      - name: Package with AnyKernel3
        run: |
          ZIP_NAME="${{ inputs.kernel_name }}-${{ matrix.ksu }}-${{ matrix.clang }}"
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"
          git clone --depth=1 https://github.com/XTENSEI/GrayRavens-anykernel anykernel
          cp kernel/out/arch/arm64/boot/Image anykernel/Image
          cd anykernel
          zip -r9 "../${ZIP_NAME}.zip" . --exclude="*.git*" --exclude="README.md" --exclude="*.placeholder"

      - name: Upload flashable zip
        id: upload-zip
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}.zip

      - name: Update progress - Upload
        if: always()
        run: |
          set +e
          if [ -z "${MESSAGE_ID}" ] || [ "${MESSAGE_ID}" = "null" ]; then exit 0; fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BAR="#################### 100%"
          TEXT="$(printf '%b' "<b>⚙️ Build Progress</b>\n📋 <b>Workflow:</b> Kernel Build\n🧬 <b>Variant:</b> <code>${{ matrix.ksu }}</code> | <code>${{ matrix.clang }}</code>\n🧩 <b>Stage:</b> Upload\n📶 <b>Progress:</b> <code>${BAR}</code>\n🪵 <a href=\"${RUN_URL}\">Full Workflow Log</a>")"
          curl -s -o /dev/null -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/editMessageText" -d chat_id="${TG_CHAT_ID}" -d message_id="${MESSAGE_ID}" --data-urlencode text="$TEXT" -d parse_mode="HTML" -d disable_web_page_preview=true

      - name: Compute Build Time
        if: always()
        run: |
          END_TIME=$(date +%s)
          DIFF=$((END_TIME - START_TIME))
          echo "BUILD_TIME=$((DIFF / 60))m $((DIFF % 60))s" >> "$GITHUB_ENV"

      - name: Send Success Notification
        if: success()
        env:
          SUCCESS_STICKER: "CAACAgUAAxkBAAFNAUpqN0lKsS2P_ew34Ldk-yA5xhg4bAAC0RgAAsMgYFdOfiL7ZJKFUDwE"
        run: |
          set +e
          ARTIFACT_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG="$(printf '%b' "<b>✅ Build Succeeded</b>\n📋 <b>Workflow:</b> Kernel Build\n📱 <b>Kernel:</b> <code>${{ inputs.kernel_name }}</code>\n🧬 <b>Variant:</b> <code>${{ matrix.ksu }}</code> | <code>${{ matrix.clang }}</code>\n⏱️ <b>Time:</b> <code>${BUILD_TIME}</code>\n🔗 <a href=\"${ARTIFACT_URL}\">Open run (Artifacts)</a>")"
          REPLY_PARAM=""
          if [ -n "${MESSAGE_ID}" ] && [ "${MESSAGE_ID}" != "null" ]; then REPLY_PARAM="-d reply_to_message_id=${MESSAGE_ID}"; fi
          curl -s -o /dev/null -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" -d chat_id="${TG_CHAT_ID}" $REPLY_PARAM --data-urlencode text="$MSG" -d parse_mode="HTML" -d disable_web_page_preview=true
          curl -s -o /dev/null -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendSticker" -d chat_id="${TG_CHAT_ID}" $REPLY_PARAM -d sticker="${SUCCESS_STICKER}"

      - name: Send Failed Notification
        if: failure()
        env:
          FAIL_STICKER: "CAACAgIAAxkBAAFNAUxqN0lgFIm_LcQAAUJvYSHSyQABjIiDAALJQgACsjhYSljb2W62RQRlPAQ"
        run: |
          set +e
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG="$(printf '%b' "<b>❌ Build Failed</b>\n📋 <b>Workflow:</b> Kernel Build\n📱 <b>Kernel:</b> <code>${{ inputs.kernel_name }}</code>\n🧬 <b>Variant:</b> <code>${{ matrix.ksu }}</code> | <code>${{ matrix.clang }}</code>\n⏱️ <b>Time:</b> <code>${BUILD_TIME}</code>\n🔍 <a href=\"${RUN_URL}\">Check Logs</a>")"
          REPLY_PARAM=""
          if [ -n "${MESSAGE_ID}" ] && [ "${MESSAGE_ID}" != "null" ]; then REPLY_PARAM="-d reply_to_message_id=${MESSAGE_ID}"; fi
          curl -s -o /dev/null -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" -d chat_id="${TG_CHAT_ID}" $REPLY_PARAM --data-urlencode text="$MSG" -d parse_mode="HTML" -d disable_web_page_preview=true
          curl -s -o /dev/null -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendSticker" -d chat_id="${TG_CHAT_ID}" $REPLY_PARAM -d sticker="${FAIL_STICKER}"

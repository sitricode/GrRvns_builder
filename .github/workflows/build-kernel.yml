name: Build kernel

on:
  workflow_dispatch:
    inputs:
      ksu_variant:
        description: 'KernelSU variant (ALL = KOWSU + KSUN + VANILLA)'
        type: choice
        options:
          - KOWSU
          - KSUN
          - VANILLA
          - ALL
        default: KOWSU

      clang_variant:
        description: 'Clang toolchain (ALL = NEUTRON_19 + AOSP_12 + YUKI_23)'
        type: choice
        options:
          - NEUTRON_19
          - AOSP_12
          - YUKI_23
          - ALL
        default: NEUTRON_19

      kernel_ref:
        description: 'kernel branch / tag / SHA to build'
        type: string
        default: android12-5.10

      kernel_name:
        description: 'Kernel zip name (without .zip)'
        type: string
        default: NexusKernel!

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      ksu_variants: ${{ steps.resolve.outputs.ksu_variants }}
      clang_variants: ${{ steps.resolve.outputs.clang_variants }}

    steps:
      - name: Resolve variants
        id: resolve
        run: |
          if [ "${{ inputs.ksu_variant }}" = "ALL" ]; then
            echo 'ksu_variants=["KOWSU","KSUN","VANILLA"]' >> $GITHUB_OUTPUT
          else
            echo 'ksu_variants=["${{ inputs.ksu_variant }}"]' >> $GITHUB_OUTPUT
          fi

          if [ "${{ inputs.clang_variant }}" = "ALL" ]; then
            echo 'clang_variants=["NEUTRON_19","AOSP_12","YUKI_23"]' >> $GITHUB_OUTPUT
          else
            echo 'clang_variants=["${{ inputs.clang_variant }}"]' >> $GITHUB_OUTPUT
          fi

  build:
    needs: setup
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        ksu: ${{ fromJson(needs.setup.outputs.ksu_variants) }}
        clang: ${{ fromJson(needs.setup.outputs.clang_variants) }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── INSTALL DEPENDENCIES ─────────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            bc bison flex build-essential libssl-dev libelf-dev \
            cpio kmod rsync zip patch curl ca-certificates \
            python3 python3-pip python3-lxml git wget zstd \
            lld llvm clang

      # ── ENABLE 12GB SWAP ─────────────────────────────
      - name: Enable 12GB Swap
        run: |
          sudo swapoff -a || true
          sudo fallocate -l 12G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

          echo "Swap status:"
          free -h
          swapon --show

      # ── NEUTRON CLANG ─────────────────────────────
      - name: Download Neutron Clang 19
        if: matrix.clang == 'NEUTRON_19'
        run: |
          mkdir -p ~/toolchain/neutron-clang
          cd ~/toolchain/neutron-clang
          curl -LO "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman"
          chmod +x antman
          ./antman -S=10032024
          ./antman --patch=glibc

      # ── AOSP CLANG ─────────────────────────────
      - name: Cache AOSP Clang
        if: matrix.clang == 'AOSP_12'
        id: cache-aosp
        uses: actions/cache@v4
        with:
          path: ~/toolchain/aosp-clang
          key: aosp-clang-r445002

      - name: Download AOSP Clang
        if: matrix.clang == 'AOSP_12' && steps.cache-aosp.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 \
            https://github.com/AOSP-12/prebuilts_clang_host_linux-x86_clang-r445002.git \
            ~/toolchain/aosp-clang

      # ── YUKI CLANG ─────────────────────────────
      - name: Download Yuki Clang 23
        if: matrix.clang == 'YUKI_23'
        run: |
          mkdir -p ~/toolchain/yuki-clang
          cd ~/toolchain/yuki-clang

          wget -O yuki.tar.zst \
            "https://usc1.contabostorage.com/ab57618a161b456a8d009c2e2de4a408:xperience/toolchains/yuki-clang-+bolt-20260124.tar.zst"

          tar --use-compress-program=unzstd -xvf yuki.tar.zst
          rm -f yuki.tar.zst

      # ── EXPORT CLANG PATH ─────────────────────────
      - name: Export CLANG_PATH
        run: |
          case "${{ matrix.clang }}" in
            NEUTRON_19)
              echo "CLANG_PATH=$HOME/toolchain/neutron-clang" >> $GITHUB_ENV
              ;;
            AOSP_12)
              echo "CLANG_PATH=$HOME/toolchain/aosp-clang" >> $GITHUB_ENV
              ;;
            YUKI_23)
              echo "CLANG_PATH=$HOME/toolchain/yuki-clang" >> $GITHUB_ENV
              ;;
          esac

      # ── CLONE KERNEL ─────────────────────────────
      - name: Clone kernel
        run: |
          git clone --depth=1 --branch "${{ inputs.kernel_ref }}" \
            https://github.com/Juanstews/kernel_common-5.10 kernel

      # ── KERNELSU SETUP ─────────────────────────────
      - name: Apply KernelSU
        if: matrix.ksu != 'VANILLA'
        working-directory: kernel
        run: |
          if [ "${{ matrix.ksu }}" = "KOWSU" ]; then
            curl -LSs https://raw.githubusercontent.com/KOWX712/KernelSU/main/kernel/setup.sh | bash -s master
            echo -e "\nCONFIG_KSU=y\nCONFIG_KSU_SUSFS=n" >> arch/arm64/configs/gki_defconfig
          else
            curl -LSs https://raw.githubusercontent.com/pershoot/KernelSU-Next/dev-susfs/kernel/setup.sh | bash -s dev-susfs
            echo -e "\nCONFIG_KSU=y\nCONFIG_KSU_SUSFS=y" >> arch/arm64/configs/gki_defconfig
          fi

      # ── SUSFS PATCH ─────────────────────────────
      - name: Apply SUSFS patches (KSUN only)
        if: matrix.ksu == 'KSUN'
        working-directory: kernel
        run: |
          set -e

          git clone https://gitlab.com/simonpunk/susfs4ksu/ -b gki-android12-5.10 sus
          rm -rf sus/.git

          SUSFS_PATH="sus/kernel_patches"

          cp -r "$SUSFS_PATH/fs" ./
          cp -r "$SUSFS_PATH/include" ./
          cp "$SUSFS_PATH/50_add_susfs_in_gki-android12-5.10.patch" ./

          patch -p1 < 50_add_susfs_in_gki-android12-5.10.patch

      # ── BUILD ────────────────────────────────
      - name: Build kernel
        working-directory: kernel
        env:
          CLANG_PATH: ${{ env.CLANG_PATH }}
        run: |
          # Enable FULL LTO
          scripts/config --file arch/arm64/configs/gki_defconfig \
            -e LTO_CLANG \
            -e LTO_CLANG_FULL \
            -d LTO_CLANG_THIN \
            -d THINLTO \
            -d LTO_NONE

          # Performance optimizations
          scripts/config --file arch/arm64/configs/gki_defconfig \
            -e CC_OPTIMIZE_FOR_PERFORMANCE

          cp ../build.sh .
          chmod +x build.sh

          make ARCH=arm64 gki_defconfig

          ./build.sh

      # ── PACKAGE ──────────────────────────────
      - name: Package
        run: |
          git clone --depth=1 https://github.com/XTENSEI/GrayRavens-anykernel anykernel
          cp kernel/out/arch/arm64/boot/Image anykernel/Image
          cd anykernel
          zip -r9 "../${{ inputs.kernel_name }}-${{ matrix.ksu }}-${{ matrix.clang }}.zip" .

      # ── UPLOAD IMAGE ──────────────────────────────
      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: Image-${{ matrix.ksu }}-${{ matrix.clang }}
          path: kernel/out/arch/arm64/boot/Image

      # ── UPLOAD ZIP ──────────────────────────────
      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: ZIP-${{ matrix.ksu }}-${{ matrix.clang }}
          path: "*.zip"

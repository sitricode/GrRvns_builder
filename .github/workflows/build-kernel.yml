name: Build kernel

on:
  workflow_dispatch:
    inputs:
      ksu_variant:
        description: 'KernelSU variant (ALL = KOWSU + KSUN + VANILLA)'
        type: choice
        options:
          - KOWSU
          - KSUN
          - VANILLA
          - ALL
        default: KOWSU

      clang_variant:
        description: 'Clang toolchain'
        type: choice
        options:
          - NEUTRON_19
          - AOSP_12
          - YUKI_22
          - YUKI_23
          - ALL
        default: NEUTRON_19

      kernel_ref:
        description: 'kernel branch / tag / SHA to build'
        type: string
        default: android12-5.10

      kernel_name:
        description: 'Kernel zip name (without .zip)'
        type: string
        default: NexusKernel!

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      ksu_variants: ${{ steps.resolve.outputs.ksu_variants }}
      clang_variants: ${{ steps.resolve.outputs.clang_variants }}

    steps:
      - name: Resolve variants
        id: resolve
        run: |
          if [ "${{ inputs.ksu_variant }}" = "ALL" ]; then
            echo 'ksu_variants=["KOWSU","KSUN","VANILLA"]' >> $GITHUB_OUTPUT
          else
            echo 'ksu_variants=["${{ inputs.ksu_variant }}"]' >> $GITHUB_OUTPUT
          fi

          if [ "${{ inputs.clang_variant }}" = "ALL" ]; then
            echo 'clang_variants=["NEUTRON_19","AOSP_12","YUKI_22","YUKI_23"]' >> $GITHUB_OUTPUT
          else
            echo 'clang_variants=["${{ inputs.clang_variant }}"]' >> $GITHUB_OUTPUT
          fi

  build:
    needs: setup
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        ksu: ${{ fromJson(needs.setup.outputs.ksu_variants) }}
        clang: ${{ fromJson(needs.setup.outputs.clang_variants) }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 16GB SWAP ─────────────────────────────────────────────
      - name: Setup 16GB Swap
        run: |
          sudo swapoff -a || true
          sudo fallocate -l 16G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            bc bison flex build-essential libssl-dev libelf-dev \
            cpio kmod rsync zip patch curl ca-certificates \
            python3 python3-pip python3-lxml git wget zstd llvm lld clang

      # ── NEUTRON ─────────────────────────────────────────────
      - name: Download Neutron Clang 19
        if: matrix.clang == 'NEUTRON_19'
        run: |
          mkdir -p ~/toolchain/neutron
          cd ~/toolchain/neutron
          curl -LO https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman
          chmod +x antman
          ./antman -S=10032024
          ./antman --patch=glibc

      # ── AOSP ─────────────────────────────────────────────
      - name: Cache AOSP Clang
        if: matrix.clang == 'AOSP_12'
        uses: actions/cache@v4
        with:
          path: ~/toolchain/aosp
          key: aosp-clang-r445002

      - name: Download AOSP Clang
        if: matrix.clang == 'AOSP_12'
        run: |
          git clone --depth=1 https://github.com/AOSP-12/prebuilts_clang_host_linux-x86_clang-r445002.git ~/toolchain/aosp

      # ── YUKI 22 ─────────────────────────────────────────────
      - name: Download Yuki Clang 22
        if: matrix.clang == 'YUKI_22'
        run: |
          mkdir -p ~/toolchain/yuki22
          cd ~/toolchain/yuki22
          wget -O yuki.tar.zst "https://usc1.contabostorage.com/ab57618a161b456a8d009c2e2de4a408:xperience/toolchains/yuki-clang-+bolt-20251211.tar.zst"
          tar --use-compress-program=unzstd -xvf yuki.tar.zst
          rm -f yuki.tar.zst

      # ── YUKI 23 ─────────────────────────────────────────────
      - name: Download Yuki Clang 23
        if: matrix.clang == 'YUKI_23'
        run: |
          mkdir -p ~/toolchain/yuki23
          cd ~/toolchain/yuki23
          wget -O yuki.tar.zst "https://usc1.contabostorage.com/ab57618a161b456a8d009c2e2de4a408:xperience/toolchains/yuki-clang-+bolt-20260124.tar.zst"
          tar --use-compress-program=unzstd -xvf yuki.tar.zst
          rm -f yuki.tar.zst

      # ── EXPORT CLANG ─────────────────────────────────────────
      - name: Export CLANG_PATH
        run: |
          case "${{ matrix.clang }}" in
            NEUTRON_19) echo "CLANG_PATH=$HOME/toolchain/neutron" >> $GITHUB_ENV ;;
            AOSP_12)    echo "CLANG_PATH=$HOME/toolchain/aosp" >> $GITHUB_ENV ;;
            YUKI_22)    echo "CLANG_PATH=$HOME/toolchain/yuki22" >> $GITHUB_ENV ;;
            YUKI_23)    echo "CLANG_PATH=$HOME/toolchain/yuki23" >> $GITHUB_ENV ;;
          esac

      # ── CLONE KERNEL ─────────────────────────────────────────
      - name: Clone kernel
        run: |
          git clone --depth=1 --branch "${{ inputs.kernel_ref }}" \
            https://github.com/Juanstews/kernel_common-5.10 kernel 

      # ── KERNELSU ─────────────────────────────────────────────
      - name: Apply KernelSU
        if: matrix.ksu != 'VANILLA'
        working-directory: kernel
        run: |
          if [ "${{ matrix.ksu }}" = "KOWSU" ]; then
            curl -LSs https://raw.githubusercontent.com/KOWX712/KernelSU/main/kernel/setup.sh | bash -s master
            printf '\nCONFIG_KSU=y\nCONFIG_KSU_SUSFS=n\n' >> arch/arm64/configs/gki_defconfig
          else
            curl -LSs https://raw.githubusercontent.com/pershoot/KernelSU-Next/dev-susfs/kernel/setup.sh | bash -s dev-susfs
            printf '\nCONFIG_KSU=y\nCONFIG_KSU_SUSFS=y\n' >> arch/arm64/configs/gki_defconfig
          fi


      - name: Verify KSU integration (${{ matrix.ksu }})
        if: matrix.ksu != 'VANILLA'
        working-directory: kernel
        run: |
          echo "=== KSU directory check ==="
          ls -la KernelSU* 2>/dev/null || echo "WARNING: No KernelSU dir found!"
          echo "=== drivers/kernelsu check ==="
          ls drivers/kernelsu/ 2>/dev/null || echo "WARNING: drivers/kernelsu missing!"
          echo "=== Kconfig/Makefile hooks ==="
          grep -r "kernelsu\|KSU" drivers/Makefile drivers/Kconfig 2>/dev/null || echo "WARNING: No KSU hooks in drivers!"
          echo "=== gki_defconfig KSU entries ==="
          grep "CONFIG_KSU" arch/arm64/configs/gki_defconfig || echo "WARNING: No KSU configs in gki_defconfig!"

      - name: Apply SUSFS patches (KSUN only)
        if: matrix.ksu == 'KSUN'
        working-directory: kernel
        run: |
          git clone https://gitlab.com/simonpunk/susfs4ksu/ -b gki-android12-5.10 sus
          rm -rf sus/.git
          susfs=sus/kernel_patches
          cp -r "$susfs/fs" .
          cp -r "$susfs/include" .
          cp -r "$susfs/50_add_susfs_in_gki-android12-5.10.patch" .
          patch -p1 < 50_add_susfs_in_gki-android12-5.10.patch
      # ── BUILD ─────────────────────────────────────────────
      - name: Build kernel
        working-directory: kernel
        run: |
          mkdir -p out
          make O=out gki_defconfig
          make -j$(nproc --all) O=out

      # ── PACKAGE ─────────────────────────────────────────────
      - name: Package
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 anykernel
          cp kernel/out/arch/arm64/boot/Image anykernel/
          cd anykernel
          zip -r9 "../${{ inputs.kernel_name }}-${{ matrix.ksu }}-${{ matrix.clang }}.zip" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.kernel_name }}-${{ matrix.ksu }}-${{ matrix.clang }}
          path: "*.zip"
